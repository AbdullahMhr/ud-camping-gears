<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Define Fonts & Styles -->
  <style>
    .text { font-family: 'Arial', sans-serif; font-weight: 800; font-size: 24px; fill: black; text-anchor: middle; letter-spacing: 2px; }
    .path { fill: none; stroke: black; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .fill-black { fill: black; stroke: none; }
  </style>

  <!-- Defs for text paths -->
  <defs>
    <path id="textPathTop" d="M 50,150 A 100,100 0 0,1 250,150" />
    <path id="textPathBottom" d="M 60,150 A 90,90 0 0,0 240,150" />
  </defs>

  <!-- Outer Double Circle -->
  <circle cx="150" cy="150" r="140" fill="none" stroke="black" stroke-width="4" />
  <circle cx="150" cy="150" r="120" fill="none" stroke="black" stroke-width="2" />

  <!-- Text -->
  <text class="text" dy="-10">
    <textPath href="#textPathTop" startOffset="50%">
      UD CAMPING GEARS
    </textPath>
  </text>
  
  <text class="text" dy="25" font-size="20">
    <textPath href="#textPathBottom" startOffset="50%">
      MAWANELLA
    </textPath>
  </text>

  <!-- Ribbons (Cutting the circle) -->
  <!-- Left Ribbon -->
  <path d="M 10,135 L 45,135 L 45,165 L 10,165 L 20,150 Z" class="fill-black" />
  <!-- Right Ribbon -->
  <path d="M 290,135 L 255,135 L 255,165 L 290,165 L 280,150 Z" class="fill-black" />

  <!-- Fishermen Silhouettes inside Ribbons (Inverted color usually, but simpler as outlines or negative space) -->
  <!-- Trying negative space by drawing white paths inside black ribbon? -->
  <path d="M 28,145 L 28,155 M 25,148 L 31,148 M 15,140 Q 20,135 25,145" stroke="white" stroke-width="1.5" fill="none" />
  <path d="M 272,145 L 272,155 M 269,148 L 275,148 M 285,140 Q 280,135 275,145" stroke="white" stroke-width="1.5" fill="none" />


  <!-- Center Illustration Group -->
  <g transform="translate(75, 75) scale(1)">
    <!-- Sun -->
    <path d="M 30,50 A 20,20 0 0,1 55,35" class="path" stroke-width="2" />

    <!-- Mountains -->
    <path d="M 50,40 L 80,10 L 110,40 L 130,20 L 160,80" class="path" stroke-width="2" fill="none" />
    <path d="M 80,10 Q 90,20 90,35" class="path" stroke-width="1.5" />
    
    <!-- Trees (Left) -->
    <path d="M 20,90 L 30,70 L 40,90 Z" class="fill-black" />
    <path d="M 30,80 L 40,60 L 50,80 Z" class="fill-black" />
    <path d="M 10,85 L 20,65 L 30,85 Z" class="fill-black" />

    <!-- Tent -->
    <path d="M 50,90 L 80,40 L 110,90" class="path" stroke-width="3" fill="white"/>
    <path d="M 80,40 L 80,90" class="path" stroke-width="2" />
    <path d="M 50,90 H 110" class="path" stroke-width="2" />
    <!-- Tent Flap -->
    <path d="M 65,90 L 80,55 L 95,90" class="path" stroke-width="1.5" fill="none" />

    <!-- Fire (Right) -->
    <path d="M 130,85 Q 125,75 130,65 Q 135,75 140,85" class="path" stroke-width="2" fill="none" />
    <path d="M 135,85 Q 135,70 145,60" class="path" stroke-width="2" fill="none" />
    
    <!-- Logs -->
    <path d="M 120,90 L 145,85" class="path" stroke-width="4" />
    <path d="M 120,85 L 145,90" class="path" stroke-width="4" />

    <!-- Water/River (Bottom) -->
    <path d="M 40,110 Q 75,100 110,110 T 180,110" class="path" stroke-width="2" />
    <path d="M 50,120 Q 80,110 110,120 T 170,120" class="path" stroke-width="2" />
  </g>
</svg>
